<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JIBRI — La Collection Complète</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* On réutilise tes styles de base ici pour que la page reste identique */
        :root { --or: #C9A96E; --noir: #080808; --blanc-creme: #F5F0E8; --texte-muet: #A89880; --font-display: 'Palatino', serif; --font-sans: 'Century Gothic', sans-serif; }
        body { background-color: var(--noir); color: var(--blanc-creme); font-family: var(--font-sans); margin: 0; padding-top: 100px; }
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; z-index: 1000; background: var(--noir); border-bottom: 1px solid rgba(201, 169, 110, 0.1); }
        .logo { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.3rem; color: var(--or); text-decoration: none; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--texte-muet); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1rem; }
        
        .filter-container { text-align: center; padding: 4rem 10%; }
        .filter-btn { background: transparent; border: 1px solid rgba(201,169,110,0.3); color: var(--texte-muet); padding: 0.8rem 2rem; margin: 0.5rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1rem; transition: 0.3s; }
        .filter-btn.active { border-color: var(--or); color: var(--or); }
        
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; padding: 0 10% 8rem; }
        .card { position: relative; height: 400px; overflow: hidden; background: #121212; border: 1px solid rgba(201,169,110,0.1); cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--or); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.6s; }
        .card:hover img { opacity: 0.9; transform: scale(1.05); }
        .card-info { position: absolute; bottom: 1.5rem; left: 1.5rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">JIBRI</a>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="filter-container">
        <h1 style="font-family: var(--font-display); font-size: 2.5rem; color: var(--or); margin-bottom: 2rem;">Le Catalogue</h1>
        <button class="filter-btn active" onclick="filterItems('all')">Tous</button>
        <button class="filter-btn" onclick="filterItems('bague')">Bagues</button>
        <button class="filter-btn" onclick="filterItems('bracelet')">Bracelets</button>
        <button class="filter-btn" onclick="filterItems('collier')">Colliers</button>
    </div>

    <div class="grid-gallery">
        <div class="card bague">
            <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=800" alt="Bague Héritage">
            <div class="card-info"><h3>Bague Héritage</h3><p style="color:var(--or)">OR JAUNE 18K</p></div>
        </div>
        <div class="card bracelet">
            <img src="https://i.postimg.cc/kgSttPQJ/test2.jpg" alt="Bracelet Éclat">
            <div class="card-info"><h3>Éclat Nocturne</h3><p style="color:var(--or)">ONYX & DIAMANTS</p></div>
        </div>
        </div>

    <script>
        function filterItems(category) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(card => {
                if(category === 'all' || card.classList.contains(category)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
