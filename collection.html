<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JIBRI — La Collection Complète</title>
    <style>
        :root { 
            --or: #C9A96E; 
            --noir: #080808; 
            --noir-surface: #121212;
            --blanc-creme: #F5F0E8; 
            --texte-muet: #A89880; 
            --font-display: 'Palatino', 'Georgia', serif; 
            --font-sans: 'Century Gothic', 'Optima', sans-serif; 
            --transition-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--noir); color: var(--blanc-creme); font-family: var(--font-sans); padding-top: 100px; overflow-x: hidden; }

        /* --- PRELOADER --- */
        #loader { position: fixed; inset: 0; background: var(--noir); display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 1s var(--transition-smooth), visibility 1s; }
        .loader-content { text-align: center; }
        .loader-logo { font-family: var(--font-display); font-size: 2rem; color: var(--or); letter-spacing: 0.8rem; margin-bottom: 1rem; text-transform: uppercase; }
        .loader-bar { width: 0; height: 1px; background: var(--or); margin: 0 auto; animation: load-line 1.2s var(--transition-smooth) forwards; }
        .loader-hidden { opacity: 0; visibility: hidden; }
        @keyframes load-line { to { width: 120px; } }

        /* --- Navigation --- */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; z-index: 1000; background: rgba(8, 8, 8, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(201, 169, 110, 0.1); }
        .logo { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 0.3rem; color: var(--or); text-decoration: none; z-index: 1002; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--texte-muet); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--or); }

        /* Burger Mobile */
        .menu-toggle { display: none; flex-direction: column; cursor: pointer; z-index: 1002; }
        .bar { width: 25px; height: 1px; background-color: var(--or); margin: 4px 0; transition: 0.4s; }

        /* --- Catalogue & Filtres --- */
        .filter-container { text-align: center; padding: 4rem 10% 2rem; }
        .filter-btn { background: transparent; border: 1px solid rgba(201,169,110,0.3); color: var(--texte-muet); padding: 0.8rem 2rem; margin: 0.5rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1rem; transition: 0.3s; font-size: 0.7rem; }
        .filter-btn.active { border-color: var(--or); color: var(--or); background: rgba(201, 169, 110, 0.05); }
        
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; padding: 2rem 10% 8rem; }
        
        .card { position: relative; height: 450px; overflow: hidden; background: var(--noir-surface); border: 1px solid rgba(201,169,110,0.1); cursor: pointer; transition: 0.5s var(--transition-smooth); }
        .card:hover { border-color: var(--or); transform: translateY(-5px); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.8s var(--transition-smooth); }
        .card:hover img { opacity: 0.8; transform: scale(1.08); }
        
        .card-info { position: absolute; bottom: 2rem; left: 2rem; pointer-events: none; }
        .card-info h3 { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 0.5rem; letter-spacing: 0.05rem; }
        .card-info p { color: var(--or); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2rem; }

        .hidden { display: none; }

        /* Responsive */
        @media (max-width: 900px) {
            .menu-toggle { display: flex; }
            .nav-links { position: fixed; right: -100%; top: 0; height: 100vh; width: 100%; background: var(--noir); flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; z-index: 1001; }
            .nav-links.active { right: 0; }
            .grid-gallery { padding: 2rem 5% 5rem; }
            .is-active .bar:nth-child(2) { opacity: 0; }
            .is-active .bar:nth-child(1) { transform: translateY(9px) rotate(45deg); }
            .is-active .bar:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h1 class="loader-logo">JIBRI</h1>
            <div class="loader-bar"></div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="logo">JIBRI</a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#exposition">Exposition</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="filter-container">
        <p style="color: var(--or); letter-spacing: 0.3rem; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 1rem;">Catalogue Exclusif</p>
        <h1 style="font-family: var(--font-display); font-size: 3rem; color: white; margin-bottom: 2.5rem;">La Collection</h1>
        
        <button class="filter-btn active" onclick="filterItems('all', this)">Tous</button>
        <button class="filter-btn" onclick="filterItems('bague', this)">Bagues</button>
        <button class="filter-btn" onclick="filterItems('bracelet', this)">Bracelets</button>
        <button class="filter-btn" onclick="filterItems('collier', this)">Colliers</button>
    </div>

    <div class="grid-gallery">
        <div class="card bague">
            <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=800" alt="Bague">
            <div class="card-info"><h3>Alliance Éternité</h3><p>Or Jaune 18K</p></div>
        </div>
        <div class="card bracelet">
            <img src="https://i.postimg.cc/kgSttPQJ/test2.jpg" alt="Bracelet">
            <div class="card-info"><h3>Éclat Nocturne</h3><p>Onyx & Diamants</p></div>
        </div>
        <div class="card collier">
            <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?q=80&w=800" alt="Collier">
            <div class="card-info"><h3>Sautoir Royal</h3><p>Perles de Culture</p></div>
        </div>
        <div class="card bague">
            <img src="https://images.unsplash.com/photo-1544441893-675973e31985?q=80&w=800" alt="Bague">
            <div class="card-info"><h3>Solitaire Pur</h3><p>Platine & Diamant</p></div>
        </div>
        <div class="card bracelet">
            <img src="https://i.postimg.cc/901YK5xp/test1.jpg" alt="Bracelet">
            <div class="card-info"><h3>Alhambra Onice</h3><p>Édition Héritage</p></div>
        </div>
        <div class="card collier">
            <img src="https://images.unsplash.com/photo-1611085583191-a3b1a6a9344e?q=80&w=800" alt="Collier">
            <div class="card-info"><h3>Pendentif Astral</h3><p>Or Rose & Saphir</p></div>
        </div>
    </div>

    <script>
        // Preloader
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => { loader.classList.add('loader-hidden'); }, 1200);
        });

        // Menu Mobile
        const menu = document.querySelector('#mobile-menu');
        const menuLinks = document.querySelector('.nav-links');
        menu.addEventListener('click', () => {
            menu.classList.toggle('is-active');
            menuLinks.classList.toggle('active');
        });

        // Filtrage
        function filterItems(category, btn) {
            const cards = document.querySelectorAll('.card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            cards.forEach(card => {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                
                setTimeout(() => {
                    if(category === 'all' || card.classList.contains(category)) {
                        card.classList.remove('hidden');
                        setTimeout(() => {
                            card.style.opacity = '1';
                            card.style.transform = 'scale(1)';
                        }, 50);
                    } else {
                        card.classList.add('hidden');
                    }
                }, 400);
            });
        }
    </script>
</body>
</html>
